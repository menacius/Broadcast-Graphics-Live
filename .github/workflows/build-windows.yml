name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GSP_VERSION: 0.8.1-alpha
  OBS_TEMPLATE_REF: 3e7d7ac3b5342cd7d9b88890b9c70b472d1520fc

jobs:
  windows-x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: obsproject/obs-plugintemplate
          ref: ${{ env.OBS_TEMPLATE_REF }}
          path: .ci/obs-plugintemplate
      - uses: actions/cache@v4
        with:
          path: |
            .ci/obs-plugintemplate/.deps
            vcpkg_installed
          key: windows-obs32-${{ hashFiles('buildspec.json', 'vcpkg.json') }}
      - name: Prepare OBS SDK
        shell: pwsh
        run: |
          Copy-Item buildspec.json .ci/obs-plugintemplate/buildspec.json -Force
          Push-Location .ci/obs-plugintemplate
          cmake --preset windows-x64
          Pop-Location
      - name: Configure
        shell: pwsh
        run: |
          $VcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $VcpkgRoot) { $VcpkgRoot = 'C:\vcpkg' }
          $DepsRoot = (Resolve-Path '.ci/obs-plugintemplate/.deps').Path
          $Prefixes = @($DepsRoot)
          $Prefixes += Get-ChildItem $DepsRoot -Directory -Filter 'obs-deps-*' | ForEach-Object { $_.FullName }
          cmake -S . -B build-windows -G 'Visual Studio 17 2022' -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=$VcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            "-DOBS_SDK_DIR=$DepsRoot" `
            "-DCMAKE_PREFIX_PATH=$($Prefixes -join ';')" `
            -DOBS_GSP_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build-windows --config RelWithDebInfo --parallel
      - name: Test
        run: ctest --test-dir build-windows -C RelWithDebInfo --output-on-failure
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path build-windows/obs-graphics-studio-pro -DestinationPath "release/GSP-$env:GSP_VERSION-windows-x64.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: GSP-${{ env.GSP_VERSION }}-windows-x64
          path: release/*.zip
