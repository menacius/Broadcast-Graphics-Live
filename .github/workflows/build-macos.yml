name: Build macOS

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  OBS_TEMPLATE_REF: 3e7d7ac3b5342cd7d9b88890b9c70b472d1520fc

jobs:
  macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/checkout@v4
        with:
          repository: obsproject/obs-plugintemplate
          ref: ${{ env.OBS_TEMPLATE_REF }}
          path: .ci/obs-plugintemplate
          show-progress: false
      - name: Prepare OBS SDK
        id: prepare_obs
        shell: bash
        run: |
          set +e
          bash -x scripts/ci/prepare-macos.sh > macos-prepare.log 2>&1
          status=$?
          cat macos-prepare.log
          exit $status
      - name: Upload preparation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-prepare-diagnostics
          path: macos-prepare.log
          if-no-files-found: warn
      - name: Configure
        run: cmake -S . -B build-macos -G Xcode -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DOBS_SDK_DIR="$OBS_GSP_DEPS_ROOT" -DCMAKE_PREFIX_PATH="$OBS_GSP_PREFIX_PATH" -DOBS_GSP_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build-macos --config RelWithDebInfo --parallel
      - name: Test
        run: ctest --test-dir build-macos -C RelWithDebInfo --output-on-failure
